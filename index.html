<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentor Admin - Teachers Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2a7de1; --primary-hover: #1a67c4;
      --bg: #f4f7fc; --bg-dark: #0b0e14;
      --card: #ffffff; --card-dark: #1a1f2b;
      --text: #0b1e33; --text-dark: #eef2f6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: var(--bg-dark); color: var(--text-dark); }
    .admin-container { width: 100%; max-width: 1200px; }

    .login-card, .dashboard-card {
      background: var(--card); backdrop-filter: blur(20px);
      border-radius: 24px; padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.2);
    }
    body.dark .login-card, body.dark .dashboard-card {
      background: var(--card-dark); border-color: rgba(255,255,255,0.05);
    }

    .logo { text-align: center; margin-bottom: 30px; }
    .logo i { font-size: 44px; color: var(--primary); }
    .logo h1 { font-size: 30px; font-weight: 700; background: linear-gradient(135deg, #2a7de1, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 8px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #aaa; }
    .input-wrapper input, .input-wrapper select {
      width: 100%; padding: 14px 44px; border: 1px solid #e0e5ec; border-radius: 12px;
      font-size: 15px; background: rgba(255,255,255,0.8); color: inherit;
    }
    body.dark .input-wrapper input, body.dark .input-wrapper select {
      background: rgba(26,31,43,0.8); border-color: #2a3142; color: #eef2f6;
    }
    .input-wrapper input:focus, .input-wrapper select:focus {
      outline: none; border-color: var(--primary);
    }
    .toggle-password { position: absolute; right: 16px; left: auto; cursor: pointer; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: var(--primary); color: white; font-weight: 600; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--primary-hover); }
    .error-message { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }

    .header-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 15px;
    }
    .logout-btn {
      background: none; border: 1px solid #e0e5ec; padding: 8px 16px;
      border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    body.dark .logout-btn { border-color: #2a3142; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
    body.dark th, body.dark td { border-color: rgba(255,255,255,0.06); }
    th { font-weight: 600; opacity: 0.7; }

    .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-success { background: #d4edda; color: #155724; }
    .badge-warning { background: #fff3cd; color: #856404; }
    .action-btn {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 500; margin-right: 6px;
    }
    .action-btn.approve { background: #2ecc71; color: white; }
    .action-btn.reject { background: #e74c3c; color: white; }
    .action-btn.delete { background: #ff7675; color: white; }

    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      display: flex; justify-content: center; align-items: center;
      z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s;
    }
    .modal.active { visibility: visible; opacity: 1; }
    .modal-content {
      background: var(--card); border-radius: 24px; padding: 30px;
      width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
    }
    body.dark .modal-content { background: var(--card-dark); }

    .toast {
      position: fixed; bottom: 30px; right: 30px; background: #fff;
      color: #0b1e33; padding: 16px 24px; border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.18); display: flex;
      align-items: center; gap: 12px; backdrop-filter: blur(20px);
      z-index: 3000; transform: translateY(120px); opacity: 0;
      transition: all 0.3s; max-width: 350px; border-left: 4px solid var(--primary);
    }
    body.dark .toast { background: #1a1f2b; color: #eef2f6; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: #e74c3c; }
    .toast.success { border-left-color: #2ecc71; }

    .grade-checkboxes { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .grade-checkboxes label {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.03); padding: 6px 12px; border-radius: 20px;
      cursor: pointer;
    }
    body.dark .grade-checkboxes label { background: rgba(255,255,255,0.05); }

    /* جعل زر الإضافة بارزًا */
    .btn-add {
      background: #2ecc71; color: white; padding: 12px 24px;
      border: none; border-radius: 30px; font-weight: 600; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 12px rgba(46,204,113,0.3);
      transition: transform 0.2s;
    }
    .btn-add:hover { transform: translateY(-2px); }

    @media (max-width: 768px) {
      .login-card, .dashboard-card { padding: 25px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Login -->
    <div id="loginSection" class="login-card">
      <div class="logo">
        <i class="fas fa-shield-alt"></i>
        <h1>Zentor Admin</h1>
        <p>Teacher Approval Panel</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="adminEmail" placeholder="admin@gmail.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="adminPassword" placeholder="••••••••" required>
            <i class="toggle-password fas fa-eye" id="togglePassword"></i>
          </div>
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Login</button>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="dashboard-card" style="display: none;">
      <div class="header-bar">
        <h2><i class="fas fa-users-cog"></i> Teachers Management</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
          <!-- زر إضافة معلم واضح -->
          <button id="addTeacherBtn" class="btn-add"><i class="fas fa-user-plus"></i> Add Teacher</button>
          <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
      <div id="tableContainer"></div>
    </div>
  </div>

  <!-- Add Teacher Modal -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <h2>Add New Teacher</h2>
      <form id="addTeacherForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="newName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="newEmail" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="newPassword" required minlength="6">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="newPhone" required>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <select id="newSubject" required>
            <option value="">-- Select --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Grades</label>
          <div class="grade-checkboxes" id="newGrades"></div>
        </div>
        <div class="error-message" id="addError"></div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="btn" style="width: auto; background: #aaa;" id="cancelAddBtn">Cancel</button>
          <button type="submit" class="btn" style="width: auto;"><i class="fas fa-user-plus"></i> Create & Activate</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const toast = document.getElementById('toast');
    function showToast(msg, type='success') {
      toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 5000);
    }

    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const addModal = document.getElementById('addModal');

    document.getElementById('togglePassword').addEventListener('click', function(){
      const p = document.getElementById('adminPassword');
      p.type = p.type === 'password' ? 'text' : 'password';
      this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      document.getElementById('loginError').style.display = 'none';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        document.getElementById('loginError').textContent = 'Login failed: ' + err.message;
        document.getElementById('loginError').style.display = 'block';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    // Open modal
    document.getElementById('addTeacherBtn').addEventListener('click', () => {
      document.getElementById('addError').style.display = 'none';
      document.getElementById('addTeacherForm').reset();
      addModal.classList.add('active');
    });
    document.getElementById('cancelAddBtn').addEventListener('click', () => addModal.classList.remove('active'));

    const subjects = ['Mathematics', 'Physics', 'Chemistry', 'Biology', 'English', 'Arabic', 'Computer Science', 'History', 'Geography'];
    const grades = Array.from({length:12},(_,i)=>`Grade ${i+1}`);
    const subjectSelect = document.getElementById('newSubject');
    subjects.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; subjectSelect.appendChild(opt); });
    const gradeDiv = document.getElementById('newGrades');
    grades.forEach(g => {
      const lbl = document.createElement('label');
      lbl.innerHTML = `<input type="checkbox" value="${g}"> ${g}`;
      gradeDiv.appendChild(lbl);
    });

    document.getElementById('addTeacherForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      const password = document.getElementById('newPassword').value;
      const phone = document.getElementById('newPhone').value.trim();
      const subject = document.getElementById('newSubject').value;
      const selectedGrades = [...document.querySelectorAll('#newGrades input:checked')].map(cb => cb.value);
      const errEl = document.getElementById('addError');
      errEl.style.display = 'none';
      if (!subject || selectedGrades.length === 0) {
        errEl.textContent = 'Please select subject and at least one grade.';
        errEl.style.display = 'block';
        return;
      }
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const uid = userCred.user.uid;
        const profileData = { name, email, phone, subject, grades: selectedGrades, approved: true, createdAt: new Date().toISOString() };
        try {
          await setDoc(doc(db, `teachers/${uid}/settings/profile`), profileData);
          await setDoc(doc(db, `teachers/${uid}/settings/preferences`), { activatedAt: new Date().toISOString() });
          showToast('Teacher created and activated!', 'success');
          addModal.classList.remove('active');
          loadTeachers();
        } catch (firestoreError) {
          showToast('Account created but Firestore write failed (check rules).', 'error');
          addModal.classList.remove('active');
          loadTeachers();
        }
      } catch (authError) {
        errEl.textContent = authError.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create & Activate';
      }
    });

    async function loadTeachers() {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i></div>';
      try {
        const teachersSnap = await getDocs(collection(db, 'teachers'));
        const teachers = [];
        for (const teacherDoc of teachersSnap.docs) {
          const uid = teacherDoc.id;
          const [profileSnap, prefSnap] = await Promise.all([
            getDoc(doc(db, `teachers/${uid}/settings/profile`)),
            getDoc(doc(db, `teachers/${uid}/settings/preferences`))
          ]);
          if (profileSnap.exists()) {
            teachers.push({ uid, ...profileSnap.data(), approved: prefSnap.exists() });
          }
        }
        teachers.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
        if (teachers.length === 0) {
          container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.6;">No teachers registered yet. Click "Add Teacher" to create one.</div>';
          return;
        }
        let html = `<table><thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
        teachers.forEach(t => {
          const badge = t.approved ? '<span class="badge badge-success">Activated</span>' : '<span class="badge badge-warning">Pending</span>';
          const actions = t.approved
            ? `<button class="action-btn reject" data-uid="${t.uid}">Deactivate</button>`
            : `<button class="action-btn approve" data-uid="${t.uid}">Activate</button>`;
          actions += `<button class="action-btn delete" data-uid="${t.uid}">Delete</button>`;
          html += `<tr><td>${t.name}</td><td>${t.email}</td><td>${t.subject}</td><td>${badge}</td><td>${actions}</td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
        document.querySelectorAll('.approve').forEach(b => b.addEventListener('click', (e) => toggleActivation(e.target.dataset.uid, true)));
        document.querySelectorAll('.reject').forEach(b => b.addEventListener('click', (e) => toggleActivation(e.target.dataset.uid, false)));
        document.querySelectorAll('.delete').forEach(b => b.addEventListener('click', (e) => deleteTeacher(e.target.dataset.uid)));
      } catch (err) {
        container.innerHTML = `<div style="color:red;">Error: ${err.message}</div>`;
      }
    }

    async function toggleActivation(uid, activate) {
      const ref = doc(db, `teachers/${uid}/settings/preferences`);
      try {
        if (activate) await setDoc(ref, { activatedAt: new Date().toISOString() });
        else await deleteDoc(ref);
        showToast(activate ? 'Activated!' : 'Deactivated!', 'success');
        loadTeachers();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function deleteTeacher(uid) {
      if (!confirm('Delete teacher and all data?')) return;
      try {
        await deleteDoc(doc(db, 'teachers', uid));
        showToast('Deleted.', 'success');
        loadTeachers();
      } catch (err) {
        showToast('Delete failed: ' + err.message, 'error');
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (user && user.email.toLowerCase() === 'admin@gmail.com') {
        loginSection.style.display = 'none';
        dashboardSection.style.display = 'block';
        loadTeachers();
      } else {
        loginSection.style.display = 'block';
        dashboardSection.style.display = 'none';
      }
    });
  </script>
</body>
</html>
